version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: vidanjorcum-db
    environment:
      POSTGRES_USER: vuser
      POSTGRES_PASSWORD: vpassword
      POSTGRES_DB: vidanjorcum
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: always

volumes:
  pgdata:
